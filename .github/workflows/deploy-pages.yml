# Publishes the static site to branch `gh-pages` (no configure-pages / no GitHub Actions Pages API).
#
# If the "Publish to gh-pages branch" step fails with permission denied:
#   Repo ? Settings ? Actions ? General ? Workflow permissions ?
#   enable "Read and write permissions" (required for GITHUB_TOKEN to push gh-pages).
#
# After a green run: Settings ? Pages ? Deploy from branch ? gh-pages ? / (root).

name: Publish catalog (gh-pages)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  publish:
    name: Push site to gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          force_orphan: true
